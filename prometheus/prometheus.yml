global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: loki
    static_configs:
      - targets:
          - loki:3100

  - job_name: grafana
    metrics_path: /metrics
    static_configs:
      - targets:
          - grafana:3000

  - job_name: loki-canary
    static_configs:
      - targets:
          - loki-canary:3500

  - job_name: warroom-dlp-file-collector
    metrics_path: /metrics
    static_configs:
      - targets:
          - warroom-dlp-file-collector:8010

  - job_name: snmp-exporter
    metrics_path: /metrics
    static_configs:
      - targets:
          - snmp-exporter:9116
