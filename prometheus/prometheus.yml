global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: loki
    static_configs:
      - targets:
          - loki:3100

  - job_name: grafana
    metrics_path: /warroom/metrics
    static_configs:
      - targets:
          - grafana:3000

  - job_name: warroom-dlp-file-collector
    metrics_path: /metrics
    static_configs:
      - targets:
          - warroom-dlp-file-collector:8010

  - job_name: warroom-ai-anomaly-scorer
    metrics_path: /metrics
    static_configs:
      - targets:
          - warroom-ai-anomaly-scorer:8020

  # All three exporters live in the warroom-exporters container on
  # different ports (post-consolidation).
  - job_name: asusrouter
    metrics_path: /metrics
    scrape_interval: 30s
    static_configs:
      - targets:
          - warroom-exporters:9117
        labels:
          device: asusrouter_192.168.100.1

  - job_name: warroom-geoip-enrich
    metrics_path: /metrics
    scrape_interval: 60s
    static_configs:
      - targets:
          - warroom-exporters:9118

  - job_name: warroom-securityscan-exporter
    metrics_path: /metrics
    scrape_interval: 1m
    static_configs:
      - targets:
          - warroom-exporters:9119
        labels:
          nas_host: rawdb

  - job_name: aisecurity-llm-sidecar
    metrics_path: /metrics
    scrape_interval: 5s
    static_configs:
      - targets:
          - host.docker.internal:7731
        labels:
          service: aisecurity-llm-sidecar
          model_family: qwen
          telemetry_scope: proxy

  - job_name: aisecurity-llamacpp-runtime
    metrics_path: /metrics
    scrape_interval: 5s
    static_configs:
      - targets:
          - 192.168.112.1:7730
        labels:
          service: aisecurity-llamacpp-runtime
          model_family: qwen
          telemetry_scope: runtime-cache

  - job_name: aisecurity-gpu
    metrics_path: /metrics
    scrape_interval: 5s
    static_configs:
      - targets:
          - host.docker.internal:7732
        labels:
          service: aisecurity-gpu
          gpu: rtx-3090
          telemetry_scope: gpu
