services:
  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:11.5.2}
    container_name: warroom-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-change-me-local-only}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_METRICS_ENABLED: "true"
      GF_SERVER_ROOT_URL: "${GRAFANA_ROOT_URL:-http://localhost:3000/warroom/}"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/var/lib/grafana/dashboards/[40 企業資料洩露監控]/thesmart-dlp-file-evidence.json"
      GF_SMTP_ENABLED: "${GRAFANA_SMTP_ENABLED:-true}"
      GF_SMTP_HOST: "${GRAFANA_SMTP_HOST:-rawdb:25}"
      GF_SMTP_FROM_ADDRESS: "${GRAFANA_SMTP_FROM_ADDRESS:-service@sob.com.tw}"
      GF_SMTP_FROM_NAME: "${GRAFANA_SMTP_FROM_NAME:-Warroom Grafana}"
      GF_SMTP_SKIP_VERIFY: "${GRAFANA_SMTP_SKIP_VERIFY:-true}"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana/dashboards-sunshine:/var/lib/grafana/dashboards-sunshine:ro
    healthcheck:
      test: ["CMD-SHELL", "test -f '/var/lib/grafana/dashboards/[40 企業資料洩露監控]/thesmart-dlp-file-evidence.json'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      warroom-dlp-file-collector:
        condition: service_started
      warroom-ai-anomaly-scorer:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: warroom-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  loki:
    image: grafana/loki:3.4.2
    container_name: warroom-loki
    restart: unless-stopped
    ports:
      - "${LOKI_PORT:-3100}:3100"
    command:
      - "-config.file=/etc/loki/loki-config.yaml"
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki

  # All log shippers merged into one alloy container reading loki/alloy.d/*.alloy.
  warroom-alloy:
    image: grafana/alloy:v1.8.2
    container_name: warroom-alloy
    restart: unless-stopped
    environment:
      TZ: Asia/Taipei
    command:
      - "run"
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "--storage.path=/var/lib/alloy/data"
      - "/etc/alloy"
    ports:
      - "${SYNOLOGY_NGINX_SYSLOG_TCP_PORT:-1514}:1514/tcp"
      - "${SYNOLOGY_NGINX_SYSLOG_UDP_PORT:-1514}:1514/udp"
    volumes:
      - ./loki/alloy.d:/etc/alloy:ro
      - alloy-data:/var/lib/alloy/data
      - ${SYNOLOGY_NGINX_LOG_DIR:-./synology-nginx-logs}:/var/log/synology-nginx:ro
      - ./devices/asusrouter_192.168.100.1/state:/var/log/asusrouter:ro
      - ./services/warroom-rawdb-nginx-tail/state:/var/log/rawdb-nginx:ro
      - ./services/warroom-rawdb-mail-tail/state:/var/log/rawdb-mail:ro
      - /home/pkcs12/projects/aisecurity/logs:/var/log/aisecurity-llm-sidecar:ro
    depends_on:
      loki:
        condition: service_started

  # All Python HTTP exporters merged into one container running 3 threads.
  warroom-exporters:
    build:
      context: ./services/warroom-exporters
    container_name: warroom-exporters
    restart: unless-stopped
    environment:
      TZ: Asia/Taipei
      # asusrouter (port 9117)
      ROUTER_HOST: "192.168.100.1"
      ROUTER_USER: "admin"
      ROUTER_SSH_KEY: "/id_ed25519"
      BANS_FILE: "/state/banned.json"
      # geoip (port 9118)
      CITY_DB_PATH: "/data/dbip-city-mmdb/dbip-city-ipv4.mmdb"
      ASN_DB_PATH: "/data/asn-mmdb/asn.mmdb"
      IP_FEED_URL: "http://loki:3100/loki/api/v1/query"
      # securityscan (port 9119)
      RAWDB_HOST: "192.168.100.40"
      RAWDB_USER: "yeatsluo"
      RAWDB_SSH_KEY: "/id_ed25519"
      NAS_HOST: "rawdb"
    volumes:
      - ${HOME}/.ssh/id_ed25519:/id_ed25519:ro
      - ./refs/ip-location-db:/data:ro
      - ./devices/asusrouter_192.168.100.1/state:/state:ro
    expose:
      - "9117"
      - "9118"
      - "9119"

  warroom-dlp-file-collector:
    build:
      context: ./services/warroom-dlp-file-collector
    container_name: warroom-dlp-file-collector
    restart: unless-stopped
    environment:
      HOME: "/home/pkcs12"
      LOKI_PUSH_URL: "http://loki:3100/loki/api/v1/push"
      WARROOM_DLP_FILE_COLLECTOR_PORT: "8010"
      WARROOM_DLP_COLLECTOR_SOURCES: "${WARROOM_DLP_COLLECTOR_SOURCES:-host_health_remote,file_station_remote,nas_home_log_remote,nas_system_log_remote}"
      WARROOM_DLP_COLLECTOR_INTERVAL_SECONDS: "${WARROOM_DLP_COLLECTOR_INTERVAL_SECONDS:-30}"
      WARROOM_DLP_TOOLS_DIR: "/tools"
      WARROOM_SERVER_ROOTS_DIR: "/servers"
      WARROOM_NAS_TARGETS_CONFIG: "${WARROOM_NAS_TARGETS_CONFIG:-/config/nas-targets.json}"
      WARROOM_GEOIP_MMDB_PATH: "${WARROOM_GEOIP_MMDB_PATH:-}"
      WARROOM_FILE_STATION_REMOTE_HOST: "${WARROOM_FILE_STATION_REMOTE_HOST:-rawdb}"
      WARROOM_FILE_STATION_REMOTE_USER: "${WARROOM_FILE_STATION_REMOTE_USER:-}"
      WARROOM_FILE_STATION_NAS_HOST: "${WARROOM_FILE_STATION_NAS_HOST:-rawdb}"
      WARROOM_FILE_STATION_REMOTE_LIMIT: "${WARROOM_FILE_STATION_REMOTE_LIMIT:-50}"
      WARROOM_FILE_STATION_REMOTE_TIMEOUT_SECONDS: "${WARROOM_FILE_STATION_REMOTE_TIMEOUT_SECONDS:-30}"
      WARROOM_FILE_STATION_DB_PATH: "${WARROOM_FILE_STATION_DB_PATH:-/volume1/@database/synolog/.DSMFMXFERDB}"
      WARROOM_SSH_IDENTITY_FILE: "${WARROOM_SSH_IDENTITY_FILE:-/home/pkcs12/.ssh/id_ed25519}"
    expose:
      - "8010"
    command:
      - "sh"
      - "-c"
      - "test -r /home/pkcs12/.ssh/id_ed25519 || { echo 'missing SSH key from WARROOM_SSH_DIR SSOT' >&2; exit 1; }; exec python /app/app.py"
    volumes:
      - ./services/warroom-dlp-file-collector/app.py:/app/app.py:ro
      - ./tools:/tools:ro
      - ./config:/config:ro
      - .:/servers
      - ./geoip:/geoip:ro
      - ${WARROOM_SSH_DIR:-/home/pkcs12/.ssh}:/home/pkcs12/.ssh:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8010/metrics\", timeout=5).read(1)'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      loki:
        condition: service_started

  warroom-ai-anomaly-scorer:
    image: ${WARROOM_AI_SCORER_IMAGE:-python:3.9}
    container_name: warroom-ai-anomaly-scorer
    restart: unless-stopped
    environment:
      WARROOM_AI_ANOMALY_SCORER_PORT: "8020"
      WARROOM_AI_LOKI_QUERY_URL: "http://loki:3100/loki/api/v1/query"
      WARROOM_AI_LOKI_PUSH_URL: "http://loki:3100/loki/api/v1/push"
      WARROOM_AI_NAS_HOST: "${WARROOM_AI_NAS_HOST:-thesmart}"
      WARROOM_AI_SCORER_INTERVAL_SECONDS: "${WARROOM_AI_SCORER_INTERVAL_SECONDS:-60}"
      WARROOM_AI_LLM_ENABLED: "${WARROOM_AI_LLM_ENABLED:-true}"
      WARROOM_AI_LLM_PROVIDER: "${WARROOM_AI_LLM_PROVIDER:-openai_compatible}"
      WARROOM_AI_LLM_PROVIDER_ID: "${WARROOM_AI_LLM_PROVIDER_ID:-rawbase}"
      WARROOM_AI_LLM_BASE_URL: "${WARROOM_AI_LLM_BASE_URL:-http://host.docker.internal:7731/v1}"
      WARROOM_AI_LLM_CHAT_COMPLETIONS_PATH: "${WARROOM_AI_LLM_CHAT_COMPLETIONS_PATH:-/chat/completions}"
      WARROOM_AI_LLM_MODEL: "${WARROOM_AI_LLM_MODEL:-Qwen3.6-35B-A3B-Uncensored-HauhauCS-Aggressive-Q4_K_M.gguf}"
      WARROOM_AI_LLM_MODEL_SPEC: "${WARROOM_AI_LLM_MODEL_SPEC:-rawbase/Qwen3.6-35B-A3B-Uncensored-HauhauCS-Aggressive-Q4_K_M.gguf}"
      WARROOM_AI_LLM_API_KEY: "${WARROOM_AI_LLM_API_KEY:-local}"
      WARROOM_AI_LLM_CONNECT_TIMEOUT_SECONDS: "${WARROOM_AI_LLM_CONNECT_TIMEOUT_SECONDS:-5}"
      WARROOM_AI_LLM_READ_TIMEOUT_SECONDS: "${WARROOM_AI_LLM_READ_TIMEOUT_SECONDS:-45}"
      WARROOM_AI_LLM_TEMPERATURE: "${WARROOM_AI_LLM_TEMPERATURE:-0.1}"
      WARROOM_AI_LLM_MAX_EVIDENCE_EVENTS: "${WARROOM_AI_LLM_MAX_EVIDENCE_EVENTS:-20}"
      WARROOM_AI_LLM_RESPONSE_FORMAT: "${WARROOM_AI_LLM_RESPONSE_FORMAT:-json_object}"
      WARROOM_AI_ENTITY_HASH_SALT: "${WARROOM_AI_ENTITY_HASH_SALT:-warroom-local-dev-salt-change-me}"
      WARROOM_AI_MIN_REPEAT_SECONDS: "${WARROOM_AI_MIN_REPEAT_SECONDS:-900}"
      WARROOM_AI_AUTH_FAILURE_THRESHOLD_5M: "${WARROOM_AI_AUTH_FAILURE_THRESHOLD_5M:-20}"
      WARROOM_AI_TCP_ESTABLISHED_THRESHOLD_5M: "${WARROOM_AI_TCP_ESTABLISHED_THRESHOLD_5M:-100}"
      WARROOM_AI_LARGE_DOWNLOAD_BYTES: "${WARROOM_AI_LARGE_DOWNLOAD_BYTES:-104857600}"
    expose:
      - "8020"
    command:
      - "python"
      - "/app/app.py"
    volumes:
      - ./services/warroom-ai-anomaly-scorer/app.py:/app/app.py:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8020/healthz\", timeout=5).read(1)'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      loki:
        condition: service_started

volumes:
  grafana-data:
  prometheus-data:
  loki-data:
  alloy-data:
