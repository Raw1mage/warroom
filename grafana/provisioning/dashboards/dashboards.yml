apiVersion: 1

providers:
  - name: warroom-local
    orgId: 1
    type: file
    disableDeletion: false
    editable: true
    allowUiUpdates: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards

      foldersFromFilesStructure: true
  - name: warroom-sunshine
    orgId: 1
    folder: 陽光沙灘
    type: file
    disableDeletion: false
    editable: true
    allowUiUpdates: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards-sunshine
