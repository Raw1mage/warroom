apiVersion: 1

groups:
  - orgId: 1
    name: TheSmartAI NAS Alerts
    folder: 利善美智能
    interval: 1m
    rules:
      - uid: thesmartai-collector-down
        title: TheSmartAI collector is down
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: warroom_dlp_file_collector_up
              instant: true
              range: false
              datasource:
                type: prometheus
                uid: prometheus
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - type: query
                  evaluator:
                    type: lt
                    params: [1]
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                    params: []
              datasource:
                type: __expr__
                uid: __expr__
        for: 2m
        noDataState: Alerting
        execErrState: Error
        labels:
          nas_host: thesmart
          severity: critical
          warroom_scope: thesmartai
        annotations:
          summary: The Warroom DLP collector is down or not reporting healthy metrics.
          runbook_url: docs/ops/reboot-recovery.md

      - uid: thesmartai-active-capability-gap
        title: TheSmartAI active evidence capability gap
        condition: C
        data:
          - refId: A
            datasourceUid: loki
            relativeTimeRange:
              from: 120
              to: 0
            model:
              refId: A
              expr: sum(count_over_time({nas_host="thesmart", source_channel="collector_capability_gap", action="capability_gap"}[2m]))
              queryType: instant
              datasource:
                type: loki
                uid: loki
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 120
              to: 0
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 120
              to: 0
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - type: query
                  evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                    params: []
              datasource:
                type: __expr__
                uid: __expr__
        for: 1m
        noDataState: OK
        execErrState: Error
        labels:
          nas_host: thesmart
          severity: high
          warroom_scope: thesmartai
        annotations:
          summary: Collector emitted active capability gaps for TheSmartAI evidence collection.
          runbook_url: docs/ops/server-root-layout.md

      - uid: thesmartai-ai-scorer-down
        title: TheSmartAI AI anomaly scorer is down
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: warroom_ai_anomaly_scorer_up
              instant: true
              range: false
              datasource:
                type: prometheus
                uid: prometheus
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - type: query
                  evaluator:
                    type: lt
                    params: [1]
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                    params: []
              datasource:
                type: __expr__
                uid: __expr__
        for: 2m
        noDataState: Alerting
        execErrState: Error
        labels:
          nas_host: thesmart
          severity: high
          warroom_scope: thesmartai
        annotations:
          summary: The Phase 2 AI anomaly scorer is down or not reporting metrics.

      - uid: thesmartai-ai-anomaly-alert
        title: TheSmartAI AI anomaly alert active
        condition: C
        data:
          - refId: A
            datasourceUid: loki
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: sum(count_over_time({nas_host="thesmart", source_channel="ai_anomaly_alert", action="anomaly_alert"}[5m]))
              queryType: instant
              datasource:
                type: loki
                uid: loki
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - type: query
                  evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                    params: []
              datasource:
                type: __expr__
                uid: __expr__
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          nas_host: thesmart
          severity: high
          warroom_scope: thesmartai
        annotations:
          summary: Phase 2 AI anomaly scorer emitted an active anomaly_alert event.

      - uid: thesmartai-auth-failures-spike
        title: TheSmartAI auth failures spike
        condition: C
        data:
          - refId: A
            datasourceUid: loki
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: sum(count_over_time({nas_host="thesmart", source_channel="auth_log", action="auth_failure"}[5m]))
              queryType: instant
              datasource:
                type: loki
                uid: loki
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - type: query
                  evaluator:
                    type: gt
                    params: [20]
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                    params: []
              datasource:
                type: __expr__
                uid: __expr__
        for: 1m
        noDataState: OK
        execErrState: Error
        labels:
          nas_host: thesmart
          severity: high
          warroom_scope: thesmartai
        annotations:
          summary: More than 20 auth failures were observed in 5 minutes.

      - uid: thesmartai-large-download-ingested
        title: TheSmartAI large download evidence ingested
        condition: C
        data:
          - refId: A
            datasourceUid: loki
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: sum(count_over_time({nas_host="thesmart", source_app="file_station", action="webapp_file_download"} | json | size_bytes >= 104857600 [5m]))
              queryType: instant
              datasource:
                type: loki
                uid: loki
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - type: query
                  evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                    params: []
              datasource:
                type: __expr__
                uid: __expr__
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          nas_host: thesmart
          severity: medium
          warroom_scope: thesmartai
        annotations:
          summary: Large File Station download evidence was ingested. Treat as POC signal until observed_at freshness guard is added.

      - uid: thesmartai-tcp-established-high
        title: TheSmartAI TCP established count high
        condition: C
        data:
          - refId: A
            datasourceUid: loki
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: max_over_time({nas_host="thesmart", source_channel="network_socket"} | json | __error__="" | unwrap tcp_established_count [5m])
              queryType: instant
              datasource:
                type: loki
                uid: loki
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: B
              type: reduce
              expression: A
              reducer: max
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - type: query
                  evaluator:
                    type: gt
                    params: [100]
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                    params: []
              datasource:
                type: __expr__
                uid: __expr__
        for: 2m
        noDataState: OK
        execErrState: Error
        labels:
          nas_host: thesmart
          severity: medium
          warroom_scope: thesmartai
        annotations:
          summary: TCP established connections exceeded the POC threshold.

      - uid: thesmartai-rawbase-llm-unavailable
        title: TheSmartAI rawbase LLM triage unavailable
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: warroom_ai_llm_unavailable{provider_id="rawbase"}
              instant: true
              range: false
              datasource:
                type: prometheus
                uid: prometheus
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - type: query
                  evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                    params: []
              datasource:
                type: __expr__
                uid: __expr__
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          nas_host: thesmart
          severity: high
          warroom_scope: thesmartai
        annotations:
          summary: rawbase LLM triage is unavailable; deterministic anomaly alerts continue in degraded mode.

      - uid: thesmartai-llm-json-parse-failures
        title: TheSmartAI LLM JSON parse failures spike
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              refId: A
              expr: increase(warroom_ai_llm_json_parse_failures_total{provider_id="rawbase"}[10m])
              instant: true
              range: false
              datasource:
                type: prometheus
                uid: prometheus
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 600
              to: 0
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 600
              to: 0
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - type: query
                  evaluator:
                    type: gt
                    params: [2]
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                    params: []
              datasource:
                type: __expr__
                uid: __expr__
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          nas_host: thesmart
          severity: medium
          warroom_scope: thesmartai
        annotations:
          summary: rawbase returned invalid or non-schema JSON repeatedly in the last 10 minutes.

      - uid: thesmartai-high-ai-anomaly-promql
        title: TheSmartAI high AI anomaly alert active by metrics
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: increase(warroom_ai_anomaly_alerts_total{severity="high",llm_status="ok"}[5m])
              instant: true
              range: false
              datasource:
                type: prometheus
                uid: prometheus
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - type: query
                  evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                    params: []
              datasource:
                type: __expr__
                uid: __expr__
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          nas_host: thesmart
          severity: high
          warroom_scope: thesmartai
        annotations:
          summary: AI anomaly scorer emitted a high-severity rawbase-enriched anomaly.

      - uid: thesmartai-deterministic-without-llm
        title: TheSmartAI deterministic anomaly without LLM enrichment
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: increase(warroom_ai_anomaly_alerts_total{severity=~"medium|high",llm_status!="ok"}[5m])
              instant: true
              range: false
              datasource:
                type: prometheus
                uid: prometheus
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - type: query
                  evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                    params: []
              datasource:
                type: __expr__
                uid: __expr__
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          nas_host: thesmart
          severity: high
          warroom_scope: thesmartai
        annotations:
          summary: Deterministic anomaly alert emitted while rawbase triage was degraded or disabled.
